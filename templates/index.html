<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transformer Translator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="main">
    <div class="header">
        <h1>🌐 Language Translation using Transformer</h1>
        <p class="subtitle">Deep Learning Based Neural Machine Translation</p>
        <p class="author">Made by Sagar Rawat • BCA AIML</p>
    </div>

    <div class="card">
        <form method="POST">
            <textarea name="text" placeholder="Enter your text here..." required></textarea>

            <div class="controls">
                <select name="lang">
                    <option value="hi">🇮🇳 Hindi</option>
                    <option value="fr">🇫🇷 French</option>
                    <option value="de">🇩🇪 German</option>
                </select>

                <button type="submit">Translate 🚀</button>
            </div>
        </form>

        {% if translation %}
        <div class="result">
            <h3>Translated Output</h3>
            <p>{{ translation }}</p>
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
